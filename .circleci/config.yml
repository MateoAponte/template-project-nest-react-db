version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:20.11
      - image: cimg/postgres:16.2
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: template_test_db

    environment:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: template_test_db
      JWT_SECRET: ci_test_secret_key_at_least_16_chars
      JWT_EXPIRES_IN: 7d

    steps:
      - checkout

      - restore_cache:
          keys:
            - node-deps-{{ checksum "pnpm-lock.yaml" }}

      - run:
          name: Install pnpm
          command: corepack enable && corepack prepare pnpm@10.0.0 --activate

      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile

      - save_cache:
          paths:
            - ~/.local/share/pnpm/store
          key: node-deps-{{ checksum "pnpm-lock.yaml" }}

      - run:
          name: Run e2e tests with coverage
          command: pnpm --filter back test

      - store_artifacts:
          path: apps/back/coverage
          destination: coverage

      - store_test_results:
          path: test-results

workflows:
  test:
    jobs:
      - test
