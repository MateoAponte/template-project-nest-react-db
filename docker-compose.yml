version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16
    container_name: template-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-template_db}
    ports:
      - '${DB_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - template-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (NestJS API)
  back:
    env_file:
      - .env
    build:
      context: .
      dockerfile: apps/back/Dockerfile
    container_name: template-back
    environment:
      NODE_ENV: ${NODE_ENV:-dev}
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-template_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - template-network
    restart: unless-stopped

  # Frontend (Nginx)
  front:
    build:
      context: .
      dockerfile: apps/front/Dockerfile
    container_name: template-front
    ports:
      - '8080:8080'
    depends_on:
      - back
    networks:
      - template-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  template-network:
    driver: bridge
